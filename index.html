<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파랑새 뮤직 스튜디오</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <h1 class="logo">파랑새 뮤직</h1>
            <nav class="nav-menu">
                <a href="#home">홈</a>
                <a href="#music">나의 노래</a>
                <a href="#about">스튜디오 소개</a>
                <a href="#contact">방명록</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <h2 class="hero-title">가슴에 핀 꽃</h2>
                <p class="hero-subtitle">16년의 그리움을 담아 만든 노래</p>
                <div class="hero-buttons">
                    <button onclick="scrollToMusic()" class="btn btn-primary">노래 듣기</button>
                </div>
            </div>
        </section>

        <section id="music" class="music-gallery">
            <div class="container">
                <h3 class="section-title">추천 음악</h3>
                <div id="music-grid" class="music-grid">
                    </div>
            </div>
        </section>

        <section id="about" class="about-section" style="padding: 100px 0; text-align: center; background: #0f172a; color: white;">
            <div class="container">
                <h3 class="section-title">스튜디오 소개</h3>
                <p>AI 기술과 감성이 만나는 파랑새 뮤직 스튜디오입니다.</p>
            </div>
        </section>
    </main>

    <div id="playerModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">&times;</span>
            <div id="player-info"></div>
            <div class="controls" style="margin-top:20px; text-align:center;">
                <button class="btn" onclick="togglePlay()" id="playBtn">재생/일시정지</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
