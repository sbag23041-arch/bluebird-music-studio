<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파랑새Music Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* [사용자님의 기존 CSS 디자인을 그대로 통합했습니다] */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:#0c0d13;color:white;overflow-x:hidden;}
    header{position:fixed;top:0;width:100%;padding:20px 60px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.5 );backdrop-filter:blur(10px);z-index:999;}
    .logo{display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:700;}
    .logo img{width:60px;height:60px;border-radius:50%;object-fit:cover;}
    nav{display:flex;gap:15px;}
    .menu-btn{border:none;background:none;color:white;font-size:1rem;cursor:pointer;transition:0.3s;}
    .menu-btn:hover, .active-btn{color:#8f7cff;}
    .page{display:none;min-height:100vh;padding:140px 8%;}
    .active-page{display:block;}
    .hero{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:60px;}
    .hero-text h1{font-size:4rem;line-height:1.3;margin-bottom:30px;}
    .hero-text span{color:#8f7cff;}
    .hero-text p{line-height:2;color:#ddd;font-size:1.2rem;}
    .hero-image img{width:100%;border-radius:30px;animation:float 6s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0px);}50%{transform:translateY(-15px);}}
    .content-box{max-width:1000px;margin:auto;background:rgba(255,255,255,0.05);padding:60px;border-radius:30px;line-height:2;}
    .content-box h2{font-size:3rem;margin-bottom:30px;color:#8f7cff;}
    .music-card{margin-top:40px;display:flex;gap:50px;align-items:center;justify-content:center;flex-wrap:wrap;}
    .record-player{position:relative;}
    #record{width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,#111 15%,#000 35%,#222 55%,#000 100%);box-shadow:0 0 40px rgba(143,124,255,0.3);animation:spin 6s linear infinite;animation-play-state:paused;}
    #record::before{content:'';position:absolute;width:40px;height:40px;background:#999;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .player-info{width:350px;display:flex;flex-direction:column;gap:25px;text-align:center;}
    .upload-btn{display:inline-block;padding:15px 25px;background:#8f7cff;border-radius:30px;cursor:pointer;transition:0.3s;}
    .upload-btn:hover{transform:scale(1.05);}
    audio{width:100%;margin-top:10px;}
    input,textarea{width:100%;padding:15px;margin-top:20px;border:none;border-radius:15px;background:#1c1d25;color:white;}
    #intro{position:fixed;inset:0;background:radial-gradient(circle at center,#1b1d2e,#090a0f);display:flex;justify-content:center;align-items:center;z-index:99999;transition:1s;}
    #intro.hide{opacity:0;visibility:hidden;}
    .intro-content{text-align:center;}
    .intro-content h1{font-size:3rem;margin-bottom:20px;}
  </style>
</head>
<body>

<div id="intro">
  <div class="intro-content">
    <h1>파랑새Music</h1>
    <p>음악은 지나온 시간을 다시 걷게 하는 마법입니다.</p>
  </div>
</div>

<header>
  <div class="logo"><span>파랑새Music</span></div>
  <nav>
    <button class="menu-btn active-btn" data-target="home">홈</button>
    <button class="menu-btn" data-target="about">소개</button>
    <button class="menu-btn" data-target="songs">나의 노래</button>
  </nav>
</header>

<main>
  <section id="home" class="page active-page">
    <div class="hero">
      <div class="hero-text"><h1>AI와 감성이 만나는  
<span>파랑새Music</span></h1><p>7080 감성을 담은 개인 스튜디오입니다.</p></div>
    </div>
  </section>

  <section id="about" class="page">
    <div class="content-box"><h2>스튜디오 소개</h2><p>음악으로 소중한 추억을 되찾아주는 공간입니다.</p></div>
  </section>

  <section id="songs" class="page">
    <div class="content-box">
      <h2>나의 노래</h2>
      <div class="music-card">
        <div class="record-player"><div id="record"></div></div>
        <div class="player-info">
          <h3 id="song-title">노래를 업로드해 주세요</h3>
          <audio id="audio-player" controls></audio>
          <label for="music-upload" class="upload-btn">음악 업로드</label>
          <input type="file" id="music-upload" accept="audio/*" style="display:none;">
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  // [모든 기능을 하나로 통합한 핵심 스크립트]
  window.addEventListener('load', () => {
    // 1. 인트로 제거
    setTimeout(() => {
      const intro = document.getElementById('intro');
      if(intro) intro.classList.add('hide');
    }, 2000);

    // 2. 메뉴 이동
    const buttons = document.querySelectorAll('.menu-btn');
    buttons.forEach(btn => {
      btn.onclick = function() {
        const target = this.getAttribute('data-target');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        buttons.forEach(b => b.classList.remove('active-btn'));
        document.getElementById(target).classList.add('active-page');
        this.classList.add('active-btn');
      };
    });

    // 3. 업로드 및 재생 (핵심 해결 코드)
    const uploadInput = document.getElementById('music-upload');
    const audioPlayer = document.getElementById('audio-player');
    const songTitle = document.getElementById('song-title');
    const record = document.getElementById('record');

    if(uploadInput) {
      uploadInput.onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
          const fileURL = URL.createObjectURL(file);
          audioPlayer.src = fileURL;
          songTitle.innerText = file.name;
          audioPlayer.load();
          audioPlayer.play().catch(err => console.log("재생 버튼을 눌러주세요."));
        }
      };
    }

    // 4. 레코드판 회전 연동
    if(audioPlayer && record) {
      audioPlayer.onplay = () => { record.style.animationPlayState = "running"; };
      audioPlayer.onpause = () => { record.style.animationPlayState = "paused"; };
    }
  });
</script>
</body>
</html>
