<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파랑새 뮤직 스튜디오</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <h1 class="logo">
    <span style="display:flex; align-items:center; gap:10px;">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M21 3l-6 1.45V14.5a3.5 3.5 0 1 0 2 3.12V6.4l4-1v-2.4zm-9 11.5a3.5 3.5 0 1 0 2 3.12V3.12l-7 1.7V14.5a3.5 3.5 0 1 0 2 3.12V6.4l5-1.2v9.3z"/>
        </svg>
        Bluebird Music
    </span>
</h1>
            <nav class="nav-menu">
                <a href="#home">홈</a>
                <a href="#music">나의 노래</a>
                <a href="#about">스튜디오 소개</a>
                <a href="#contact">방명록</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <section id="home" class="hero">
    <div class="container" style="text-align: center;">
        <h2 class="hero-title" style="font-family: 'Georgia', serif; font-style: italic; letter-spacing: 2px;">
            Bluebird Music Studio
        </h2>
        <p class="hero-subtitle" style="font-size: 1.1rem; opacity: 0.8;">
            Since 2010 | Echoes of Longing
        </p>
        <div class="hero-buttons" style="margin-top: 40px;">
            <button onclick="scrollToMusic()" class="btn btn-primary">Enter Studio</button>
        </div>
    </div>
</section>
                <p class="hero-subtitle">16년의 그리움을 담아 만든 노래</p>
                <div class="hero-buttons">
                    <button onclick="scrollToMusic()" class="btn btn-primary">노래 듣기</button>
                </div>
            </div>
        </section>

        <section id="music" class="music-gallery">
            <div class="container">
                <h3 class="section-title">추천 음악</h3>
                <div id="music-grid" class="music-grid">
                    </div>
            </div>
        </section>

        <section id="about" class="about-section" style="padding: 100px 0; text-align: center; background: #0f172a; color: white;">
            <div class="container">
                <h3 class="section-title">스튜디오 소개</h3>
                <p>AI 기술과 감성이 만나는 파랑새 뮤직 스튜디오입니다.</p>
            </div>
        </section>
    </main>

    <div id="playerModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">&times;</span>
            <div id="player-info"></div>
            <div class="controls" style="margin-top:20px; text-align:center;">
                <button class="btn" onclick="togglePlay()" id="playBtn">재생/일시정지</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
