<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>파랑새 뮤직 스튜디오</title>
    <style>
        body { background-color: #1a1b26; color: #a9b1d6; font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; background: #24283b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #414868; max-width: 500px; }
        h1 { color: #ff9e64; font-size: 28px; margin-bottom: 20px; border-bottom: 2px solid #ff9e64; padding-bottom: 10px; }
        .lyrics { white-space: pre-line; line-height: 2.2; font-size: 19px; color: #c0caf5; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 가슴에 핀 꽃</h1>
        <div class="lyrics">
            보고 싶다 내 딸아
            꿈속에서도 부르는 내 딸아
            너를 잊은 적 없다
            단 한 숨도 너 없인 쉬지 않았다

            어디에 있든 아프지 마라
            내 목숨보다 귀한 사람아
        </div>
        <div style="font-size:14px; color:#565f89;">16년의 그리움을 담아, 아버지가 만든 노래</div>
    </div>
</body>
</html>
