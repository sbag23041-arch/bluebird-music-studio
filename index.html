<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파랑새 뮤직 스튜디오</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 로고 스타일: 깔끔한 글씨 위주 */
        .logo-container { display: flex; align-items: center; text-decoration: none; }
        .logo-ko { font-size: 1.4rem; font-weight: bold; color: #ffffff; margin-right: 8px; }
        .logo-en { font-size: 1rem; color: #fbbf24; font-style: italic; letter-spacing: 1px; }

        /* 중앙 메인 문구 스타일 */
        .hero-title-en { font-family: 'Georgia', serif; font-size: 3.5rem; font-style: italic; color: #ffffff; margin-bottom: 5px; }
        .hero-subtitle-ko { font-size: 1.5rem; color: #fbbf24; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <div class="logo-container">
                <span class="logo-ko">파랑새</span>
                <span class="logo-en">Music</span>
            </div>

            <nav class="nav-menu">
                <a href="#home">홈</a>
                <a href="#music">나의 노래</a>
                <a href="#about">스튜디오 소개</a>
                <a href="#contact">방명록</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container" style="text-align: center; padding: 100px 0;">
                <h2 class="hero-title-en">Bluebird Studio</h2>
                <p class="hero-subtitle-ko">인생을 그리다, 삶을 노래하다</p>
                <p style="color: #ffffff; opacity: 0.7; margin-top: 15px;">가슴을 울리는 중년의 선율</p>
                
                <div class="hero-buttons" style="margin-top: 40px;">
                    <button onclick="scrollToMusic()" class="btn btn-primary">노래 감상하기</button>
                </div>
            </div>
        </section>

        <section id="music" class="music-gallery">
            <div class="container">
                <h3 class="section-title">나의 노래 목록</h3>
                <div id="music-grid" class="music-grid">
                    </div>
            </div>
        </section>

        <section id="about" class="about-section" style="padding: 80px 0; text-align: center; background: rgba(15, 23, 42, 0.9);">
            <div class="container">
                <h3 class="section-title">스튜디오 소개</h3>
                <p>7080의 감성으로 인생의 깊이를 노래하는 파랑새 뮤직입니다.</p>
            </div>
        </section>
    </main>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">&times;</span>
            <div id="player-info"></div>
            <div class="controls" style="margin-top:20px; text-align:center;">
                <button class="btn btn-primary" onclick="togglePlay()" id="playBtn">재생/일시정지</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
